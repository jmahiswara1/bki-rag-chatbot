# Held-out eval set (40 entries, independent of golden_set.yaml).
# INDEPENDENT — not used by regression baselines.
# Schema mirrors eval/golden_set.yaml: id, lang, question, category, must_include.
# Note: category is metadata only — run_eval.py derives the actual scoring
# category from flags (expect_lookup / expect_no_lookup / expected_result /
# expect_error / expect_clarification / should_reject / else rules_qa).
# Tokens in must_include are matched AFTER _norm() — lowercase, comma->dot,
# whitespace collapsed. So "1,0 m" matches "1.0m" in the answer.
- id: holdout_length_l_def_id
  lang: id
  category: rules_qa
  question: Apa definisi "Length L" menurut BKI Rules for Hull?
  must_include:
  - sarat scantling
  - linggi
- id: holdout_mooring_current_id
  lang: id
  category: lookup
  expect_lookup: true
  question: Berapa kecepatan arus maksimum yang disyaratkan untuk penentuan tali tambat pada kapal dengan nilai Z lebih dari 2000?
  must_include:
  - 1,0
  - m/s
